<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SEO Tool - Difficulty</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; display:flex; background:#f5f6fa; }
.sidebar { width:220px; height:100vh; background:#0f172a; color:white; padding:20px; }
.sidebar a { display:block; color:#cbd5e1; text-decoration:none; margin:10px 0; padding:8px; }
.sidebar a:hover { background:#1e293b; color:white; }
.main { flex:1; padding:40px; }
.card { background:white; padding:30px; border-radius:12px; max-width:600px; }
</style>
</head>

<body>

<div class="sidebar">
  <h2>🚀 SEO Tool</h2>
  <a href="index.html">🏠 Dashboard</a>
  <a href="keyword.html">🔑 Keywords</a>
  <a href="questions.html">❓ Questions</a>
  <a href="titles.html">📝 Titles</a>
  <a href="difficulty.html">📊 Difficulty</a>
  <a href="analyzer.html">🔍 Analyzer</a>
</div>

<div class="main">
  <div class="card">
    <h1>Difficulté SEO</h1>
    <input id="keyword" placeholder="Ex: marketing">
    <button id="btn">Vérifier</button>
    <div id="result"></div>
  </div>
</div>

<script>
document.getElementById("btn").addEventListener("click", async () => {

  const keyword = document.getElementById("keyword").value;
  const result = document.getElementById("result");

  result.innerHTML = "⏳ Loading...";

  try{
    const res = await fetch("/api/difficulty", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ keyword })
    });

    const data = await res.json();

    result.innerHTML = `<h2>Score: ${data.score}/100</h2>`;

  }catch{
    result.innerHTML = "❌ Error";
  }

});
</script>

</body>
</html>
