<!DOCTYPE html>
<html>

<head>
  <title>Keyword Difficulty</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <ul>
    <li><a href="index.html">🏠 Home</a></li>
    <li><a href="keyword.html">Keywords</a></li>
    <li><a href="questions.html">Questions</a></li>
    <li><a href="titles.html">Titles</a></li>
    <li><a href="difficulty.html">Difficulty</a></li>
    <li><a href="analyzer.html">Analyzer</a></li>
  </ul>
</nav>

<div class="container">

  <div class="tool-box">

    <h1>Keyword Difficulty</h1>

    <div class="input-group">
      <input id="keyword" placeholder="Enter keyword">
      <button onclick="run()">Check</button>
    </div>

    <div id="result" class="result"></div>

  </div>

</div>

<script>
async function run(){

  const keyword = document.getElementById("keyword").value;
  const result = document.getElementById("result");

  if(!keyword){
    result.innerHTML = "❌ Enter a keyword";
    return;
  }

  result.innerHTML = "Loading...";

  try{

    const res = await fetch("/api/difficulty?keyword=" + encodeURIComponent(keyword));
    const data = await res.json();

    console.log(data);

    if(data.error){
      result.innerHTML = "❌ " + data.error;
      return;
    }

    // Gestion flexible selon backend
    const difficulty = data.difficulty ?? data.score ?? data;

    result.innerHTML = `
      <div class="result-item">
        Difficulty: <strong>${difficulty}</strong>
      </div>
    `;

  }catch(err){
    console.error(err);
    result.innerHTML = "❌ Server error";
  }

}
</script>

</body>
</html>
