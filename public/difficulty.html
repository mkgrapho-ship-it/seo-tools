<!DOCTYPE html>
<html>

<head>
  <title>Keyword Difficulty</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <div class="sidebar">
    <h2>🚀 SEO Tool</h2>
    <a href="index.html">🏠 Dashboard</a>
    <a href="keyword.html">🔑 Keywords</a>
    <a href="questions.html">❓ Questions</a>
    <a href="titles.html">📝 Titles</a>
    <a href="difficulty.html">📊 Difficulty</a>
    <a href="analyzer.html">🔍 Analyzer</a>
  </div>

  <div class="main">

    <div class="tool-box">

      <h1>Difficulté des mots clés</h1>

      <div class="input-group">
        <input id="keyword" placeholder="Ex: cuisine">
        <button onclick="run()">Vérifier</button>
      </div>

      <div id="result" class="results-area"></div>

    </div>

  </div>

</div>

<script>
async function run(){

  const keyword = document.getElementById("keyword").value.trim();
  const result = document.getElementById("result");

  if(!keyword){
    result.innerHTML = "⚠️ Entrez un mot-clé";
    return;
  }

  result.innerHTML = "⏳ Analyse...";

  try{
    const res = await fetch("/api/difficulty",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ keyword })
    });

    const data = await res.json();

    if(!res.ok || data.error){
      result.innerHTML = "❌ Erreur serveur";
      return;
    }

    result.innerHTML = `
      <div class="result-item">
        📊 Difficulté : <strong>${data.score}/100</strong>
      </div>
    `;

  }catch{
    result.innerHTML = "❌ Erreur serveur";
  }

}
</script>

</body>
</html>
