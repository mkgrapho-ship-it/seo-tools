<!DOCTYPE html>
<html>

<head>
  <title>Keyword Difficulty</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <ul>
    <li><a href="index.html">🏠 Home</a></li>
    <li><a href="keyword.html">Keywords</a></li>
    <li><a href="questions.html">Questions</a></li>
    <li><a href="titles.html">Titles</a></li>
    <li><a href="difficulty.html">Difficulty</a></li>
    <li><a href="analyzer.html">Analyzer</a></li>
  </ul>
</nav>

<div class="container">
  <div class="tool-box">

    <h1>Keyword Difficulty</h1>

    <div class="input-group">
      <input id="keyword" placeholder="Enter keyword">
      <button onclick="run()">Analyze</button>
    </div>

    <div id="result" class="results-area"></div>

  </div>
</div>

<script>
function run(){

  const keyword = document.getElementById("keyword").value;
  const result = document.getElementById("result");

  if(!keyword){
    result.innerHTML = "❌ Enter a keyword";
    return;
  }

  const score = Math.floor(Math.random() * 100);

  let level = "Easy";
  if(score > 70) level = "Hard";
  else if(score > 40) level = "Medium";

  result.innerHTML = `
    <div class="result-item">
      Keyword: ${keyword}<br>
      Difficulty: ${score}/100 (${level})
    </div>
  `;

}
</script>

</body>
</html>
