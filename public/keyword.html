<!DOCTYPE html>
<html>

<head>
  <title>Keyword Generator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <ul>
    <li><a href="index.html">🏠 Home</a></li>
    <li><a href="keyword.html">Keywords</a></li>
    <li><a href="questions.html">Questions</a></li>
    <li><a href="titles.html">Titles</a></li>
    <li><a href="difficulty.html">Difficulty</a></li>
    <li><a href="analyzer.html">Analyzer</a></li>
  </ul>
</nav>

<div class="container">

  <div class="tool-box">

    <h1>Keyword Generator</h1>

    <div class="input-group">
      <input id="keyword" placeholder="Enter keyword">
      <button onclick="run()">Generate</button>
    </div>

<div id="result" class="result"></div>
  </div>

</div>

<script>
async function run(){

  const keyword = document.getElementById("keyword").value;
  const result = document.getElementById("result");

  if(!keyword){
    result.innerHTML = "❌ Enter a keyword";
    return;
  }

  result.innerHTML = "Loading...";

  try{

    const res = await fetch("/api/keywords?keyword=" + encodeURIComponent(keyword));
    const data = await res.json();

    console.log(data);

    if(data.error){
      result.innerHTML = "❌ " + data.error;
      return;
    }

    // cas 1 : tableau direct
    const keywords = data.keywords || data;

    result.innerHTML = keywords.map(k =>
      `<div class="result-item">
        ${k.keyword || k}
        ${k.volume ? `<span>Vol: ${k.volume}</span>` : ""}
      </div>`
    ).join("");

  }catch(err){
    console.error(err);
    result.innerHTML = "❌ Server error";
  }

}
</script>

</body>
</html>
