<!DOCTYPE html>
<html>

<head>
  <title>Keyword Generator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🚀 SEO Tool</h2>
    <a href="index.html">🏠 Dashboard</a>
    <a href="keyword.html">🔑 Keywords</a>
    <a href="questions.html">❓ Questions</a>
    <a href="titles.html">📝 Titles</a>
    <a href="difficulty.html">📊 Difficulty</a>
    <a href="analyzer.html">🔍 Analyzer</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="tool-box">

      <h1>Générateur de mots clés</h1>

      <div class="input-group">
        <input id="keyword" placeholder="Ex: cuisine, sport...">
        <button onclick="run()">Générer</button>
      </div>

      <div id="result" class="results-area"></div>

    </div>

  </div>

</div>

<script>
async function run(){

  const keyword = document.getElementById("keyword").value.trim();
  const result = document.getElementById("result");

  if(!keyword){
    result.innerHTML = "⚠️ Entrez un mot-clé";
    return;
  }

  result.innerHTML = "⏳ Chargement...";

  try{

    const res = await fetch("/api/keywords",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ keyword })
    });

    const data = await res.json();

    // 🔥 gestion erreur backend
    if(!res.ok || data.error){
      result.innerHTML = "❌ Erreur serveur";
      return;
    }

    if(!data.length){
      result.innerHTML = "⚠️ Aucun résultat";
      return;
    }

    result.innerHTML = data.map(k => `
      <div class="result-item">
        <strong>${k.keyword}</strong>
        <span>Volume: ${k.volume || 0}</span>
      </div>
    `).join("");

  }catch(err){
    console.error(err);
    result.innerHTML = "❌ Erreur serveur";
  }

}
</script>

</body>
</html>
