<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Free Keyword Generator Tool</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f5f7fb;
margin:0;
}

header{
background:#111827;
color:white;
padding:15px 30px;
font-size:20px;
font-weight:bold;
}

.nav{
margin-top:10px;
}

.nav a{
color:white;
margin-right:20px;
text-decoration:none;
font-size:14px;
}

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

h1{
margin-bottom:20px;
}

input{
padding:12px;
width:350px;
border:1px solid #ddd;
border-radius:6px;
}

button{
padding:12px 15px;
margin-left:5px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

table{
margin-top:30px;
border-collapse:collapse;
width:100%;
background:white;
border-radius:6px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f9fafb;
}

.copy{
cursor:pointer;
color:#2563eb;
font-weight:bold;
}

</style>

</head>

<body>

<header>

SEO Tools

<div class="nav">
<a href="/">Home</a>
<a href="/keyword.html">Keyword Generator</a>
<a href="/questions.html">Keyword Questions</a>
<a href="/titles.html">Title Generator</a>
<a href="/difficulty.html">Keyword Difficulty</a>
<a href="/analyzer.html">SEO Analyzer</a>
</div>

</header>

<div class="container">

<h1>Keyword Generator</h1>

<input id="keyword" placeholder="Enter keyword">

<button onclick="search()">Search</button>

<button onclick="exportCSV()">Export CSV</button>

<table id="table">

<thead>
<tr>
<th>Keyword</th>
<th>Volume</th>
<th>CPC</th>
<th>Difficulty</th>
<th>Copy</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

let currentData = [];

async function search(){

const keyword = document.getElementById("keyword").value.trim();

if(!keyword){
alert("Enter a keyword");
return;
}

const res = await fetch("/api/keywords",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({keyword})
});

const data = await res.json();

currentData = data;

const tbody = document.querySelector("#table tbody");

tbody.innerHTML="";

data.forEach(row=>{

const tr = document.createElement("tr");

tr.innerHTML=`
<td>${row.keyword}</td>
<td>${row.volume}</td>
<td>${row.cpc}</td>
<td>${row.difficulty}</td>
<td><span class="copy" onclick="copyKeyword(this)">Copy</span></td>
`;

tbody.appendChild(tr);

});

}

function copyKeyword(element){

const keyword = element.parentElement.parentElement.children[0].innerText;

navigator.clipboard.writeText(keyword).then(()=>{

element.innerText="Copied ✓";

setTimeout(()=>{
element.innerText="Copy";
},1000);

});

}

function exportCSV(){

if(currentData.length === 0){
alert("No data to export");
return;
}

let csv="Keyword,Volume,CPC,Difficulty\n";

currentData.forEach(r=>{
csv+=`${r.keyword},${r.volume},${r.cpc},${r.difficulty}\n`;
});

const blob=new Blob([csv],{type:"text/csv"});

const url=URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;
a.download="keywords.csv";

document.body.appendChild(a);
a.click();

a.remove();

}

</script>

</body>

</html>
