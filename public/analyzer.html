<!DOCTYPE html>
<html>

<head>
<title>SEO Analyzer</title>
</head>

<body>

<h1>SEO Analyzer</h1>

<input id="url" placeholder="https://example.com">
<button onclick="analyze()">Analyze</button>

<div id="result"></div>

<script>
<script>
async function analyze() {
  const url = document.getElementById("url").value;
  const result = document.getElementById("result");

  result.innerHTML = "Loading...";

  try {
    const res = await fetch("/api/analyze?url=" + encodeURIComponent(url));
    const data = await res.json();

    if (data.error) {
      result.innerHTML = "<p style='color:red'>" + data.error + "</p>";
      return;
    }

    result.innerHTML = `
      <li><b>Title:</b> ${data.title ? "OK" : "Missing"}</li>
      <li><b>Description:</b> ${data.description ? "OK" : "Missing"}</li>
      <li><b>H1:</b> ${data.h1 > 0 ? "OK" : "Missing"}</li>
      <li><b>Images:</b> ${data.images}</li>
      <li><b>Images ALT:</b> ${data.imagesAlt}</li>
    `;
  } catch (err) {
    result.innerHTML = "<p style='color:red'>Erreur réseau</p>";
  }
}
</script>
</body>

</html>
