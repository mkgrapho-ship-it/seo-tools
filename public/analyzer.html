<!DOCTYPE html>
<html>

<head>
  <title>SEO Analyzer</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fb;
      padding: 40px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    input {
      width: 70%;
      padding: 10px;
      margin-right: 10px;
    }

    button {
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    .score {
      font-size: 26px;
      margin-top: 20px;
      text-align: center;
    }

    .good { color: green; }
    .bad { color: red; }
    .warn { color: orange; }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 8px 0;
    }

    .box {
      background: #fafafa;
      padding: 15px;
      margin-top: 15px;
      border-radius: 6px;
    }

  </style>

</head>

<body>

<div class="container">

<h1>SEO Analyzer</h1>

<input id="url" placeholder="https://example.com">
<button onclick="analyze()">Analyze</button>

<div id="result"></div>

</div>

<script>

function calculateScore(data){

  let score = 0;

  if(data.title) score += 25;
  if(data.description) score += 25;
  if(data.h1 > 0) score += 25;

  const altRatio = data.images > 0 ? data.imagesAlt / data.images : 1;
  score += Math.round(altRatio * 25);

  return score;
}

async function analyze(){

  const url = document.getElementById("url").value.trim();
  const result = document.getElementById("result");

  if(!url){
    result.innerHTML = "❌ Enter URL";
    return;
  }

  result.innerHTML = "Loading...";

  try{

    const res = await fetch("/api/analyze?url=" + encodeURIComponent(url));
    const data = await res.json();

    if(data.error){
      result.innerHTML = "❌ " + data.error;
      return;
    }

    const score = calculateScore(data);

    result.innerHTML = `
      <div class="score">SEO Score: <b>${score}/100</b></div>

      <ul>
        <li class="${data.title ? 'good' : 'bad'}">
          ${data.title ? "✔ Title OK" : "✖ Missing Title"}
        </li>

        <li class="${data.description ? 'good' : 'bad'}">
          ${data.description ? "✔ Description OK" : "✖ Missing Description"}
        </li>

        <li class="${data.h1 > 0 ? 'good' : 'bad'}">
          ${data.h1 > 0 ? "✔ H1 OK" : "✖ Missing H1"}
        </li>

        <li class="${data.imagesAlt === data.images ? 'good' : 'warn'}">
          ${data.imagesAlt === data.images ? "✔ ALT OK" : "⚠ Missing ALT"}
        </li>
      </ul>

      <div class="box">
        <p><b>Title:</b> ${data.title}</p>
        <p><b>Description:</b> ${data.description || "Missing"}</p>
        <p><b>H1:</b> ${data.h1}</p>
        <p><b>Images:</b> ${data.images}</p>
        <p><b>Images ALT:</b> ${data.imagesAlt}</p>
      </div>
    `;

  }catch(err){

    result.innerHTML = "❌ Error";

  }

}

</script>

</body>
</html>
