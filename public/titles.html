<!DOCTYPE html>
<html>

<head>
  <title>Title Generator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <ul>
    <li><a href="index.html">🏠 Home</a></li>
    <li><a href="keyword.html">Keywords</a></li>
    <li><a href="questions.html">Questions</a></li>
    <li><a href="titles.html">Titles</a></li>
    <li><a href="difficulty.html">Difficulty</a></li>
    <li><a href="analyzer.html">Analyzer</a></li>
  </ul>
</nav>

<div class="container">
  <div class="tool-box">

    <h1>Title Generator</h1>

    <div class="input-group">
      <input id="keyword" placeholder="Enter keyword">
      <button onclick="run()">Generate</button>
    </div>

    <div id="result" class="results-area"></div>

  </div>
</div>

<script>
async function run(){

  const keyword = document.getElementById("keyword").value;
  const result = document.getElementById("result");

  result.innerHTML = "Loading...";

  try{

    const res = await fetch("/api/titles",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ keyword })
    });

    const data = await res.json();

    result.innerHTML = data.map(t =>
      `<div class="result-item">${t}</div>`
    ).join("");

  }catch(err){
    result.innerHTML = "❌ Error";
  }

}
</script>

</body>
</html>
